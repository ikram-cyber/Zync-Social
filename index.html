<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC | Sync Your Vision</title>
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; animation: fadeUp 0.3s ease-out; } 
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-nav-top { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .glass-nav-bottom { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); }
        
        ::-webkit-scrollbar { display: none; }
        .nav-item { color: #64748b; transition: 0.3s; }
        .nav-item.active { color: #22d3ee; }
        
        .post-card { border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .post-card:active { background-color: rgba(255,255,255,0.02); }
        
        .brand-glow { text-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
        input, textarea { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        input:focus { border-color: #22d3ee !important; }
    </style>
</head>
<body class="selection:bg-cyan-500/30">

    <div id="p-auth" class="page active min-h-screen flex flex-col items-center justify-center px-6">
        <div class="mb-8 text-center">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-cyan-500 to-emerald-500 flex items-center justify-center text-white text-3xl font-black shadow-2xl shadow-cyan-500/20 mx-auto mb-4">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-3xl font-black tracking-[0.2em] brand-glow text-cyan-400 uppercase">ZYNC</h1>
        </div>

        <div class="w-full max-w-sm bg-slate-900/40 backdrop-blur-xl rounded-[2rem] p-8 border border-white/5 shadow-2xl">
            <h2 id="auth-title" class="text-xl font-black mb-6">Masuk Ke Zync</h2>
            
            <div class="space-y-4">
                <div id="div-user" class="hidden animate-fade">
                    <input type="text" id="auth-user" placeholder="Username" class="w-full rounded-2xl px-5 py-4 text-sm outline-none transition-all">
                </div>
                <input type="email" id="auth-email" placeholder="Alamat Email" class="w-full rounded-2xl px-5 py-4 text-sm outline-none transition-all">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full rounded-2xl px-5 py-4 text-sm outline-none transition-all">
                
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 py-4 rounded-2xl font-black text-slate-950 uppercase tracking-widest text-[10px] mt-2 shadow-lg shadow-cyan-500/10 active:scale-95 transition-all">
                    Masuk Sekarang
                </button>
            </div>
            
            <p class="text-center mt-8 text-xs text-slate-500 font-medium">
                <span id="auth-toggle-txt">Belum punya akun?</span> 
                <span onclick="toggleAuth()" id="auth-toggle-btn" class="text-cyan-400 font-bold cursor-pointer ml-1">Daftar</span>
            </p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        
        <header class="glass-nav-top fixed top-0 left-0 right-0 z-50 px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest text-cyan-400 uppercase brand-glow">Zync</h1>
            <div class="w-8 h-8 rounded-full border border-white/10 overflow-hidden" onclick="bukaTab('profile')">
                <img id="my-avatar" src="" class="w-full h-full object-cover">
            </div>
        </header>

        <main id="p-home" class="page pt-16 pb-24">
            <div id="feed-container" class="flex flex-col"></div>
        </main>

        <main id="p-post" class="page pt-16 px-5">
            <div class="flex justify-between items-center py-4">
                <button onclick="bukaTab('home')" class="text-slate-400 font-bold text-sm">Batal</button>
                <button onclick="kirimPost()" class="bg-cyan-500 text-slate-900 px-5 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest">Posting</button>
            </div>
            <textarea id="post-content" rows="8" placeholder="Apa yang terjadi?" class="w-full bg-transparent border-none p-0 text-lg outline-none resize-none placeholder-slate-700"></textarea>
        </main>

        <main id="p-profile" class="page pt-16">
            <div class="h-32 bg-gradient-to-br from-cyan-900 to-emerald-900"></div>
            <div class="px-6 -mt-12 relative">
                <img id="prof-avatar" src="" class="w-24 h-24 rounded-3xl border-4 border-[#020617] bg-slate-800 shadow-xl">
                <div class="mt-4">
                    <h1 id="prof-name" class="text-2xl font-black"></h1>
                    <p id="prof-user" class="text-cyan-500 font-bold text-sm"></p>
                    <button onclick="logout()" class="mt-6 w-full border border-rose-500/30 text-rose-500 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-500/5 transition-all">Keluar Akun</button>
                </div>
            </div>
        </main>

        <nav class="glass-nav-bottom fixed bottom-0 left-0 right-0 py-4 flex justify-around items-center z-50">
            <button class="nav-item active text-xl" onclick="bukaTab('home')" id="nav-home"><i class="fas fa-home"></i></button>
            <button class="nav-item text-xl bg-cyan-500 text-slate-900 w-12 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/20" onclick="bukaTab('post')"><i class="fas fa-plus"></i></button>
            <button class="nav-item text-xl" onclick="bukaTab('profile')" id="nav-profile"><i class="fas fa-user"></i></button>
        </nav>
    </div>

    <script>
        let isLoginMode = true;
        let currentUser = JSON.parse(localStorage.getItem('zync_session'));

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('div-user').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? "Masuk Ke Zync" : "Daftar Akun Zync";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Masuk Sekarang" : "Daftar Sekarang";
            document.getElementById('auth-toggle-txt').innerText = isLoginMode ? "Belum punya akun?" : "Sudah punya akun?";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Daftar" : "Masuk";
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('auth-user').value;

            if(!email || !pass) return alert("Mohon lengkapi data.");
            let users = JSON.parse(localStorage.getItem('zync_users')) || [];

            if(isLoginMode) {
                const found = users.find(u => u.email === email && u.pass === pass);
                if(found) {
                    localStorage.setItem('zync_session', JSON.stringify(found));
                    location.reload();
                } else alert("Kredensial salah.");
            } else {
                if(!user) return alert("Username wajib diisi.");
                if(users.find(u => u.email === email)) return alert("Email sudah ada.");
                users.push({ user, email, pass, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}` });
                localStorage.setItem('zync_users', JSON.stringify(users));
                alert("Berhasil! Silakan masuk.");
                toggleAuth();
            }
        }

        function logout() { localStorage.removeItem('zync_session'); location.reload(); }

        let posts = JSON.parse(localStorage.getItem('zync_db')) || [
            { id: 1, name: "Zync AI", user: "@zync", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Zync", content: "Selamat datang di ZYNC! Mulai sinkronkan pemikiranmu hari ini. ⚡" }
        ];

        function bukaTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + tabId).classList.add('active');
            if(document.getElementById('nav-'+tabId)) document.getElementById('nav-'+tabId).classList.add('active');
            if(tabId === 'home') renderFeed();
        }

        function renderFeed() {
            let h = '';
            posts.forEach(p => {
                h += `<div class="post-card p-5 flex gap-4">
                    <img src="${p.avatar}" class="w-10 h-10 rounded-2xl bg-slate-800 shrink-0">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-sm">${p.name}</span>
                            <span class="text-slate-500 text-xs">${p.user}</span>
                        </div>
                        <p class="text-slate-300 text-sm leading-relaxed">${p.content}</p>
                    </div>
                </div>`;
            });
            document.getElementById('feed-container').innerHTML = h;
        }

        function kirimPost() {
            const c = document.getElementById('post-content').value;
            if(!c) return;
            posts.unshift({ id: Date.now(), name: currentUser.user, user: "@"+currentUser.user.toLowerCase().replace(/\s/g,''), avatar: currentUser.avatar, content: c });
            localStorage.setItem('zync_db', JSON.stringify(posts));
            document.getElementById('post-content').value = "";
            bukaTab('home');
        }

        window.onload = () => {
            if(currentUser) {
                document.getElementById('p-auth').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('my-avatar').src = currentUser.avatar;
                document.getElementById('prof-avatar').src = currentUser.avatar;
                document.getElementById('prof-name').innerText = currentUser.user;
                document.getElementById('prof-user').innerText = "@" + currentUser.user.toLowerCase();
                bukaTab('home');
            }
        };
    </script>
</body>
</html>
