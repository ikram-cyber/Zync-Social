<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC | Sync Your Vision</title>
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .page { display: none; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); } 
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-nav-top { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .glass-nav-bottom { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); }
        
        ::-webkit-scrollbar { display: none; }
        .nav-item { color: #475569; transition: 0.3s; }
        .nav-item.active { color: #22d3ee; transform: scale(1.1); }
        
        .post-card { border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.3s; background: linear-gradient(180deg, transparent, rgba(34, 211, 238, 0.02) 100%); position: relative; overflow: hidden; }
        .brand-glow { text-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }
        
        /* PARTICLE AURA */
        @keyframes auraFloat { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }
        .aura-particle { position: absolute; width: 4px; height: 4px; background: #22d3ee; border-radius: 50%; pointer-events: none; animation: auraFloat 3s linear infinite; }

        /* DOUBLE TAP HEART */
        @keyframes heartBurst { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        .center-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: #f43f5e; opacity: 0; pointer-events: none; z-index: 100; text-shadow: 0 0 30px rgba(244, 63, 94, 0.5); }
        .animate-burst { animation: heartBurst 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .is-liked { color: #f43f5e !important; text-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }
        .verified-badge { color: #3b82f6; font-size: 10px; margin-left: 2px; }
        
        /* TERMINAL STYLE */
        .terminal-box { font-family: 'Fira Code', monospace; font-size: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(34, 211, 238, 0.2); padding: 10px; border-radius: 12px; color: #22d3ee; }
        .rank-badge { background: linear-gradient(90deg, #06b6d4, #3b82f6); color: #020617; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* SMART TAG */
        .smart-tag { color: #22d3ee; font-weight: 800; text-decoration: underline; }
    </style>
</head>
<body class="selection:bg-cyan-500/30">

    <div id="p-auth" class="page active min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <div class="mb-12" id="auth-logo">
            <div class="w-20 h-20 rounded-[2.5rem] bg-gradient-to-tr from-cyan-500 to-emerald-500 flex items-center justify-center text-white text-4xl font-black shadow-2xl mx-auto mb-6">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h1 class="text-4xl font-black tracking-[0.25em] brand-glow text-cyan-400 uppercase">ZYNC</h1>
        </div>
        <div class="w-full max-w-sm bg-slate-900/40 backdrop-blur-2xl rounded-[3rem] p-10 border border-white/5">
            <h2 id="auth-title" class="text-2xl font-black mb-8 text-white/90">Identity Lock</h2>
            <div class="space-y-5">
                <div id="div-user" class="hidden"><input type="text" id="auth-user" placeholder="Create Identity" class="w-full rounded-2xl px-6 py-4 text-sm outline-none bg-slate-800 border-white/5"></div>
                <input type="email" id="auth-email" placeholder="Email Node" class="w-full rounded-2xl px-6 py-4 text-sm outline-none bg-slate-800 border-white/5 text-white">
                <input type="password" id="auth-pass" placeholder="Access Code" class="w-full rounded-2xl px-6 py-4 text-sm outline-none bg-slate-800 border-white/5 text-white">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 py-5 rounded-2xl font-black text-slate-950 text-xs uppercase tracking-[0.2em] mt-4 shadow-xl active:scale-95 transition-all">Initialize</button>
            </div>
            <p class="text-center mt-10 text-[11px] text-slate-500 font-bold uppercase tracking-widest">
                <span id="auth-toggle-txt">New Node?</span> 
                <span onclick="toggleAuth()" id="auth-toggle-btn" class="text-cyan-400 cursor-pointer ml-1 underline">Generate</span>
            </p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="glass-nav-top fixed top-0 left-0 right-0 z-50 px-5 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-white brand-glow">Z<span class="text-cyan-400">Y</span>NC</h1>
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-2xl border-2 border-cyan-500/30 p-0.5 overflow-hidden" onclick="bukaTab('profile')">
                    <img id="my-avatar" src="" class="w-full h-full object-cover rounded-[0.6rem]">
                </div>
            </div>
        </header>

        <main id="p-home" class="page pt-20 pb-28">
            <div id="feed-container" class="flex flex-col"></div>
        </main>

        <main id="p-post" class="page pt-20 px-6">
            <div class="flex justify-between items-center py-4 mb-4">
                <button onclick="bukaTab('home')" class="text-slate-500 font-black text-xs uppercase tracking-widest">Abort</button>
                <button onclick="kirimPost()" class="bg-cyan-500 text-slate-900 px-8 py-2.5 rounded-2xl font-black text-xs uppercase tracking-[0.15em] shadow-lg">Broadcast</button>
            </div>
            <textarea id="post-content" rows="6" placeholder="Broadcast your vision..." class="w-full bg-transparent border-none p-0 text-xl font-medium outline-none resize-none placeholder-slate-800 text-white"></textarea>
            <input type="text" id="post-img" placeholder="Media URL (Optional)..." class="w-full bg-slate-800 rounded-2xl px-4 py-4 text-xs mt-4 text-white">
        </main>

        <main id="p-profile" class="page pt-20 text-center">
            <div id="aura-container" class="h-40 bg-gradient-to-br from-slate-800 via-cyan-950 to-emerald-950 mx-5 rounded-[2.5rem] mt-4 shadow-2xl relative overflow-hidden">
                </div>
            <div class="px-8 -mt-16 flex flex-col items-center relative z-10">
                <img id="prof-avatar" src="" class="w-32 h-32 rounded-[2.5rem] border-[6px] border-[#020617] bg-slate-800 shadow-2xl">
                <div class="mt-4 flex items-center gap-2">
                    <h1 id="prof-name" class="text-3xl font-black text-white"></h1>
                    <span id="rank-name" class="rank-badge">Sentinel</span>
                </div>
                <p id="prof-user" class="text-cyan-400 font-bold tracking-wide mt-1"></p>
                <div class="terminal-box w-full mt-6 text-left">
                    <p class="animate-pulse">> STATUS: SYNC_SUCCESS</p>
                    <p>> NEURAL_AURA: <span id="aura-val" class="font-bold">0</span> PT</p>
                    <p>> NODE_SYNC: <span id="clock-val">00:00</span></p>
                </div>
                <button onclick="logout()" class="mt-12 w-full max-w-xs bg-rose-500/10 text-rose-500 py-4 rounded-[1.5rem] text-[10px] font-black uppercase tracking-[0.2em] border border-rose-500/20">Purge Session</button>
            </div>
        </main>

        <nav class="glass-nav-bottom fixed bottom-8 left-6 right-6 h-20 rounded-[2rem] flex justify-around items-center z-50 px-4">
            <button class="nav-item active text-2xl" onclick="playSfx(); bukaTab('home')" id="nav-home"><i class="fas fa-microchip"></i></button>
            <button class="nav-item text-3xl bg-white text-slate-950 w-16 h-12 rounded-[1.2rem] flex items-center justify-center shadow-2xl" onclick="playSfx(); bukaTab('post')"><i class="fas fa-add"></i></button>
            <button class="nav-item text-2xl" onclick="playSfx(); bukaTab('profile')" id="nav-profile"><i class="fas fa-brain"></i></button>
        </nav>
    </div>

    <script>
        let isLoginMode = true;
        let currentUser = JSON.parse(localStorage.getItem('zync_session'));
        let aura = parseInt(localStorage.getItem('zync_aura')) || 0;
        let posts = JSON.parse(localStorage.getItem('zync_db')) || [
            { id: 1, name: "Zync Core", user: "@zync", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Zync", content: "Ketuk dua kali untuk Like! #ZyncTheFuture melampaui batas.", likes: 15400, isLiked: false, verified: true }
        ];

        function playSfx(freq = 180) {
            try { const context = new (window.AudioContext || window.webkitAudioContext)(); const osc = context.createOscillator(); const gain = context.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, context.currentTime); gain.gain.setValueAtTime(0.05, context.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1); osc.connect(gain); gain.connect(context.destination); osc.start(); osc.stop(context.currentTime + 0.1); } catch(e) {}
        }

        // NEURAL AUDIO PULSE
        function neuralAudioPulse(text) {
            playSfx(440);
            setTimeout(() => playSfx(660), 100);
            setTimeout(() => playSfx(880), 200);
        }

        function createParticles() {
            const container = document.getElementById('aura-container');
            if(!container) return;
            container.innerHTML = '';
            for(let i=0; i < Math.min(aura/10, 50); i++) {
                let p = document.createElement('div');
                p.className = 'aura-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(p);
            }
        }

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('div-user').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? "Identity Lock" : "Generate Core";
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('auth-user').value;
            if(!email || !pass) return;
            let users = JSON.parse(localStorage.getItem('zync_users')) || [];
            if(isLoginMode) {
                const found = users.find(u => u.email === email && u.pass === pass);
                if(found) { 
                    localStorage.setItem('zync_session', JSON.stringify(found)); 
                    location.reload(); 
                } else alert("Access Denied.");
            } else {
                users.push({ user, email, pass, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}`, verified: user.toLowerCase().includes('ikram') });
                localStorage.setItem('zync_users', JSON.stringify(users));
                toggleAuth();
            }
        }

        function logout() { localStorage.removeItem('zync_session'); location.reload(); }

        function bukaTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + tabId).classList.add('active');
            if(document.getElementById('nav-'+tabId)) document.getElementById('nav-'+tabId).classList.add('active');
            if(tabId === 'home') renderFeed();
            if(tabId === 'profile') {
                document.getElementById('prof-name').innerText = currentUser.user;
                document.getElementById('aura-val').innerText = aura;
                createParticles();
            }
        }

        function handleDoubleTap(id, element) {
            const heart = element.querySelector('.center-heart');
            heart.classList.remove('animate-burst');
            void heart.offsetWidth;
            heart.classList.add('animate-burst');
            playSfx(300);
            const p = posts.find(x => x.id === id);
            if(p && !p.isLiked) {
                p.isLiked = true; p.likes++; aura += 20;
                localStorage.setItem('zync_aura', aura);
                localStorage.setItem('zync_db', JSON.stringify(posts));
                renderFeed();
            }
        }

        function renderFeed() {
            let h = '';
            posts.forEach(p => {
                let contentWithTags = p.content.replace(/#(\w+)/g, '<span class="smart-tag">#$1</span>');
                h += `<div class="post-card p-6 flex gap-4" ondblclick="handleDoubleTap(${p.id}, this)">
                    <i class="fas fa-heart center-heart"></i>
                    <img src="${p.avatar}" class="w-12 h-12 rounded-[1.2rem] bg-slate-800 shrink-0 shadow-lg">
                    <div class="flex-1 text-left">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-black text-sm text-white">${p.name} ${p.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</span>
                            <button onclick="neuralAudioPulse()" class="text-cyan-500 text-[10px] uppercase font-black"><i class="fas fa-wave-square mr-1"></i> Pulse</button>
                        </div>
                        <p class="text-slate-200 text-[14px] leading-relaxed font-medium">${contentWithTags}</p>
                        ${p.img ? `<img src="${p.img}" class="mt-4 rounded-3xl w-full h-48 object-cover border border-white/5">` : ''}
                        <div class="flex gap-8 mt-5">
                            <button onclick="playSfx(); p.isLiked = !p.isLiked; p.likes = p.isLiked?p.likes+1:p.likes-1; localStorage.setItem('zync_db', JSON.stringify(posts)); renderFeed();" class="text-[11px] font-black uppercase ${p.isLiked ? 'is-liked' : 'text-slate-600'}">
                                <i class="fas fa-heart mr-2"></i> ${p.likes}
                            </button>
                            <button class="text-slate-600 text-[11px] font-black uppercase"><i class="fas fa-bolt mr-2"></i> Sync</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('feed-container').innerHTML = h;
        }

        function kirimPost() {
            const c = document.getElementById('post-content').value;
            if(!c) return;
            playSfx(440); aura += 50; localStorage.setItem('zync_aura', aura);
            posts.unshift({ id: Date.now(), name: currentUser.user, user: "@"+currentUser.user.toLowerCase(), avatar: currentUser.avatar, content: c, img: document.getElementById('post-img').value, likes: 0, verified: currentUser.verified });
            localStorage.setItem('zync_db', JSON.stringify(posts));
            document.getElementById('post-content').value = ""; bukaTab('home');
        }

        setInterval(() => {
            const now = new Date();
            const t = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if(document.getElementById('clock-val')) document.getElementById('clock-val').innerText = t;
        }, 1000);

        window.onload = () => {
            if(currentUser) {
                document.getElementById('p-auth').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('my-avatar').src = currentUser.avatar;
                document.getElementById('prof-avatar').src = currentUser.avatar;
                bukaTab('home');
            }
        };
    </script>
</body>
</html>
