<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNC | Sync Your Vision</title>
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; animation: fadeUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); } 
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-nav-top { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .glass-nav-bottom { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08); }
        
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        ::-webkit-scrollbar { display: none; }
        .nav-item { color: #64748b; transition: all 0.3s ease; }
        .nav-item.active { color: #22d3ee; transform: scale(1.1); }
        .post-card { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .circle-gradient { background: linear-gradient(45deg, #06b6d4, #10b981, #3b82f6); padding: 2px; }
        @keyframes heartBurst { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .liked i { color: #f43f5e; animation: heartBurst 0.3s ease-in-out; }
        .brand-glow { text-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
    </style>
</head>
<body>

    <div id="p-auth" class="page active min-h-screen flex flex-col items-center justify-center px-6">
        <div class="w-16 h-16 rounded-3xl bg-gradient-to-tr from-cyan-500 to-emerald-500 flex items-center justify-center text-white text-3xl font-black shadow-2xl shadow-cyan-500/30 mb-6">
            <i class="fas fa-bolt"></i>
        </div>
        <h1 class="text-4xl font-black tracking-widest uppercase mb-2 brand-glow text-cyan-400">ZYNC</h1>
        <p class="text-slate-500 text-sm font-bold uppercase tracking-widest mb-10">Sync Your Vision</p>

        <div class="w-full max-w-sm glass-card rounded-3xl p-8 shadow-2xl">
            <div id="auth-title" class="text-xl font-black mb-6">Selamat Datang</div>
            
            <div class="space-y-4">
                <div id="div-user" class="hidden">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Username</label>
                    <input type="text" id="auth-user" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-colors">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-colors">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-colors">
                </div>
                
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 py-4 rounded-xl font-black text-slate-950 uppercase tracking-widest text-xs shadow-lg shadow-cyan-500/20 active:scale-95 transition-all mt-4">
                    Masuk
                </button>
            </div>
            
            <div class="text-center mt-6">
                <p id="auth-toggle-txt" class="text-xs text-slate-400">Belum punya akun? <span onclick="toggleAuth()" class="text-cyan-400 font-bold cursor-pointer">Daftar</span></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="glass-nav-top fixed top-0 left-0 right-0 z-50 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-500 to-emerald-500 flex items-center justify-center text-white font-black">
                    <i class="fas fa-bolt text-sm"></i>
                </div>
                <h1 class="text-xl font-black tracking-widest text-cyan-400 uppercase">Zync</h1>
            </div>
            <div class="w-8 h-8 rounded-full bg-slate-800 overflow-hidden border border-slate-700 cursor-pointer" onclick="bukaTab('profile')">
                <img id="my-avatar" src="" class="w-full h-full object-cover">
            </div>
        </div>

        <div id="p-home" class="page">
            <div id="feed-container" class="flex flex-col pt-2"></div>
        </div>

        <div id="p-post" class="page px-4 pt-4">
            <div class="flex justify-between items-center mb-6">
                <button onclick="bukaTab('home')" class="text-slate-400 text-sm">Batal</button>
                <button onclick="kirimPost()" class="bg-cyan-500 text-slate-950 font-black px-6 py-1.5 rounded-full text-xs uppercase tracking-widest">Zync It!</button>
            </div>
            <textarea id="post-content" rows="6" placeholder="Apa rencanamu hari ini, Bos?" class="w-full bg-transparent text-white text-lg outline-none resize-none"></textarea>
        </div>

        <div id="p-profile" class="page">
            <div class="h-32 bg-gradient-to-br from-cyan-900 to-emerald-900"></div>
            <div class="px-6 relative pb-10">
                <div class="w-24 h-24 rounded-full border-4 border-[#020617] bg-slate-800 overflow-hidden absolute -top-12">
                    <img id="prof-avatar" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex justify-end pt-4">
                    <button onclick="logout()" class="border border-rose-500 text-rose-500 font-bold px-4 py-1.5 rounded-full text-[10px] uppercase">Logout</button>
                </div>
                <div class="mt-6">
                    <h1 id="prof-name" class="text-2xl font-black"></h1>
                    <p id="prof-user" class="text-cyan-500 font-bold"></p>
                    <p class="text-slate-400 text-sm mt-4 leading-relaxed">Member of ZYNC Elite Circle. 💻⚡</p>
                </div>
            </div>
        </div>

        <nav class="glass-nav-bottom fixed bottom-0 left-0 right-0 py-3 pb-6 flex justify-around items-center z-50">
            <button class="nav-item active text-xl" onclick="bukaTab('home')" id="nav-home"><i class="fas fa-house"></i></button>
            <button class="nav-item text-xl bg-cyan-500 text-slate-950 w-12 h-10 rounded-full flex items-center justify-center" onclick="bukaTab('post')"><i class="fas fa-plus"></i></button>
            <button class="nav-item text-xl" onclick="bukaTab('profile')" id="nav-profile"><i class="fas fa-user"></i></button>
        </nav>
    </div>

    <script>
        let isLoginMode = true;
        let currentUser = JSON.parse(localStorage.getItem('zync_session'));

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('div-user').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? "Selamat Datang" : "Buat Akun Baru";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Masuk" : "Daftar Sekarang";
            document.getElementById('auth-toggle-txt').innerHTML = isLoginMode ? 
                `Belum punya akun? <span onclick="toggleAuth()" class="text-cyan-400 font-bold cursor-pointer">Daftar</span>` :
                `Sudah punya akun? <span onclick="toggleAuth()" class="text-cyan-400 font-bold cursor-pointer">Masuk</span>`;
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('auth-user').value;

            if(!email || !pass) return alert("Isi semua data!");

            let users = JSON.parse(localStorage.getItem('zync_users')) || [];

            if(isLoginMode) {
                const found = users.find(u => u.email === email && u.pass === pass);
                if(found) {
                    localStorage.setItem('zync_session', JSON.stringify(found));
                    location.reload();
                } else {
                    alert("Email atau Password salah!");
                }
            } else {
                if(!user) return alert("Username harus diisi!");
                if(users.find(u => u.email === email)) return alert("Email sudah terdaftar!");
                
                const newUser = { 
                    user, email, pass, 
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user}` 
                };
                users.push(newUser);
                localStorage.setItem('zync_users', JSON.stringify(users));
                alert("Daftar berhasil! Silakan Login.");
                toggleAuth();
            }
        }

        function logout() {
            localStorage.removeItem('zync_session');
            location.reload();
        }

        // --- CORE APP LOGIC ---
        let posts = JSON.parse(localStorage.getItem('zync_db')) || [
            { id: 1, name: "Zync AI", user: "@zync_bot", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Zync", content: "Welcome to the future of Social. Start syncing!", likes: 99, isLiked: false }
        ];

        function bukaTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + tabId).classList.add('active');
            if(tabId === 'home') renderFeed();
        }

        function renderFeed() {
            let html = '';
            posts.forEach(p => {
                html += `
                <div class="post-card p-5">
                    <div class="flex gap-3">
                        <img src="${p.avatar}" class="w-10 h-10 rounded-full bg-slate-800">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-sm">${p.name}</span>
                                <span class="text-slate-500 text-xs">${p.user}</span>
                            </div>
                            <p class="text-slate-200 text-sm mt-1">${p.content}</p>
                            <div class="mt-3 text-slate-500 text-xs flex gap-4">
                                <span><i class="far fa-heart"></i> ${p.likes}</span>
                                <span><i class="far fa-comment"></i> 0</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('feed-container').innerHTML = html;
        }

        function kirimPost() {
            const content = document.getElementById('post-content').value;
            if(!content) return;
            posts.unshift({
                id: Date.now(),
                name: currentUser.user,
                user: "@" + currentUser.user.toLowerCase().replace(/\s+/g, ''),
                avatar: currentUser.avatar,
                content: content,
                likes: 0,
                isLiked: false
            });
            localStorage.setItem('zync_db', JSON.stringify(posts));
            document.getElementById('post-content').value = "";
            bukaTab('home');
        }

        window.onload = () => {
            if(currentUser) {
                document.getElementById('p-auth').classList.remove('active');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('p-home').classList.add('active');
                
                document.getElementById('my-avatar').src = currentUser.avatar;
                document.getElementById('prof-avatar').src = currentUser.avatar;
                document.getElementById('prof-name').innerText = currentUser.user;
                document.getElementById('prof-user').innerText = "@" + currentUser.user.toLowerCase();
                
                renderFeed();
            }
        };
    </script>
</body>
</html>
